<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/calculator" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
</head>
<body>

    <div class="content">

        <div class="writeup">
            <h1>Simple Calculator App</h1>
            <h3>Created by: Shodipo Micheal</h3>
            <a href="https://michealshodipo56.github.io/home" target="_blank"><img src="logo-1.webp" alt="logo"></a>
            <hr>
        </div>

        <div class="calculator-container">
            <div class="calculator">
                <div class="box">
                    <h1>Calculator</h1>
                    <div class="display"></div>
                </div>

                <div class="button-section">
                    <div class="row">
                    <button class="clear" onclick="cal=''; erase()">C</button>
                    <button onclick="num(' % ')">%</button>
                    <button onclick="num(' / ')">/</button>
                    </div>
                    <div class="row">
                    <button onclick="num(7)">7</button>
                    <button onclick="num(8)">8</button>
                    <button onclick="num(9)">9</button>
                    <button onclick="num(' * ')">*</button>
                    </div>
                    <div class="row">
                    <button onclick="num(4)">4</button>
                    <button onclick="num(5)">5</button>
                    <button onclick="num(6)">6</button>
                    <button onclick="num(' - ')">-</button>
                    </div>
                    <div class="row">
                    <button onclick="num(1)">1</button>
                    <button onclick="num(2)">2</button>
                    <button onclick="num(3)">3</button>
                    <button onclick="num(' + ')">+</button>
                    </div>
                    <div class="row">
                    <button onclick="num(0)">0</button>
                    <button onclick="num('.')">.</button>
                    <button class="equal" onclick="total()">=</button>
                    </div>
                </div>    
            </div>
        </div>

    
    </div>
    
</body>
</html>
